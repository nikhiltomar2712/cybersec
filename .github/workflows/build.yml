name: Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  python-test:
    runs-on: ubuntu-latest
    name: Python Tests
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest tests/ -v --cov=. --cov-report=xml || true
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: matrix.python-version == '3.11'
        with:
          files: ./coverage.xml

  javascript-build:
    runs-on: ubuntu-latest
    name: Node.js Build & Test
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test || true
      - name: Build
        run: npm run build || true

  cpp-build:
    runs-on: ubuntu-latest
    name: C++ Build
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake g++
      - name: Compile C++ tools
        run: |
          mkdir -p build
          cd build
          cmake ..
          make || true
      - name: Compile individual tools
        run: |
          g++ -std=c++17 -O2 -o build/crypto_tools tools/cpp/crypto_tools.cpp 2>&1 || true
          g++ -std=c++17 -O2 -pthread -o build/port_scanner tools/cpp/port_scanner.cpp 2>&1 || true

  docs-build:
    runs-on: ubuntu-latest
    name: Documentation
    steps:
      - uses: actions/checkout@v4
      - name: Check README
        run: |
          if [ ! -f README.md ]; then
            echo "README.md not found"
            exit 1
          fi
          echo "README.md validated"
      - name: Check documentation files
        run: |
          echo "Checking documentation structure..."
          [ -f security.md ] && echo "✓ security.md found"
          [ -f contributing.md ] && echo "✓ contributing.md found"
          [ -f code-of-conduct.md ] && echo "✓ code-of-conduct.md found"
