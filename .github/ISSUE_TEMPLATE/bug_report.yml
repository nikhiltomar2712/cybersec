name: Bug Report
description: Report a bug or issue
title: "[BUG] "
labels: [bug]

body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the bug clearly
      placeholder: "What happened?"
    validations:
      required: true
  
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How to reproduce the issue?
      placeholder: "1. Run command..."
    validations:
      required: true
  
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen?
      placeholder: "Expected output..."
    validations:
      required: true
  
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Error message..."
    validations:
      required: true
  
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Python/Node/GCC version, etc.
      placeholder: "Ubuntu 22.04, Python 3.10, Node 18"
    validations:
      required: true
  
  - type: textarea
    id: logs
    attributes:
      label: Logs/Stack Trace
      description: Any error messages or stack traces
      render: bash
      placeholder: "Paste error output here..."
