name: Feature Request
description: Suggest a new feature
title: "[FEATURE] "
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: "## Feature Request"
  
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
      placeholder: "Describe the problem..."
    validations:
      required: true
  
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this be implemented?
      placeholder: "Describe the solution..."
    validations:
      required: true
  
  - type: textarea
    id: examples
    attributes:
      label: Examples/Use Cases
      description: Provide usage examples
      placeholder: "Example usage..."
    validations:
      required: false
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches?
      placeholder: "Alternative solutions..."
    validations:
      required: false
