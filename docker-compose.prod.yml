version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: cybersec-prod
    restart: always
    ports:
      - "80:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - NODE_ENV=production
    networks:
      - cybersec
    depends_on:
      - redis
      - postgres

  nginx:
    image: nginx:alpine
    container_name: cybersec-nginx
    restart: always
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - cybersec
    depends_on:
      - app

  redis:
    image: redis:7-alpine
    container_name: cybersec-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cybersec

  postgres:
    image: postgres:15-alpine
    container_name: cybersec-db-prod
    restart: always
    environment:
      POSTGRES_DB: cybersec
      POSTGRES_USER: ${DB_USER:-cybersec}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cybersec

volumes:
  postgres_data:
  redis_data:

networks:
  cybersec:
    driver: bridge
